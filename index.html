<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DENSAPAL AGENCIES</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f5f7ff;
}

.topbar{
background:#4f46e5;
padding:20px;
display:flex;
justify-content:space-between;
align-items:center;
color:white;
}

.logo-section{
display:flex;
align-items:center;
gap:12px;
}

.logo{
width:50px;
height:50px;
background:white;
color:#4f46e5;
border-radius:12px;
display:flex;
justify-content:center;
align-items:center;
font-size:24px;
font-weight:bold;
}

.balance-box{
background:rgba(255,255,255,.2);
padding:10px 15px;
border-radius:12px;
font-weight:bold;
}

.wallet-card{
background:white;
margin:15px;
padding:20px;
border-radius:20px;
box-shadow:0 4px 15px rgba(0,0,0,.08);
}

.wallet-title{
color:gray;
font-size:14px;
}

.wallet-balance{
font-size:40px;
margin-top:10px;
}

.deposit-btn{
width:100%;
margin-top:20px;
padding:15px;
border:none;
border-radius:12px;
background:#4f46e5;
color:white;
font-size:16px;
font-weight:bold;
cursor:pointer;
}

</style>
</head>

<body>

<header class="topbar">

<div class="logo-section">

<div class="logo">
D
</div>

<div>
<h2>DENSAPAL AGENCIES</h2>
<p>Investment Platform</p>
</div>

</div>

<div class="balance-box">
KES <span id="walletBalance">0</span>
</div>

</header>

<div class="wallet-card">

<p class="wallet-title">
Available Balance
</p>

<h1 class="wallet-balance">
KES <span id="mainBalance">0</span>
</h1>

<button class="deposit-btn">
Deposit
</button>

</div>

<script>

let walletBalance =
localStorage.getItem('walletBalance') || 0;

document.getElementById('walletBalance').innerText =
walletBalance;

document.getElementById('mainBalance').innerText =
walletBalance;

</script>

</body>
</html>
